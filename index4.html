<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Location & Weather Dashboard</title>
    <!-- Open Location Code (Plus Codes) Official Library (UMD build on jsDelivr) -->
    <script src="https://cdn.jsdelivr.net/npm/@googlemaps/open-location-code@1.0.6/dist/openlocationcode.umd.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .dashboard {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
            color: var(--accent);
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .data-box {
            background: rgba(15, 23, 42, 0.4);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .full-width {
            grid-column: span 2;
        }

        .label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .value {
            font-size: 1.2rem;
            font-weight: 600;
            word-break: break-all;
        }

        .huge-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
        }

        .error {
            color: #ef4444;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 15px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>Live Dashboard</h1>

        <!-- Time & Date Section -->
        <div class="section">
            <div class="section-title">Time & Date</div>
            <div class="grid">
                <div class="data-box">
                    <div class="label">Current Time</div>
                    <div id="time" class="value">Loading...</div>
                </div>
                <div class="data-box">
                    <div class="label">Current Date</div>
                    <div id="date" class="value">Loading...</div>
                </div>
            </div>
        </div>

        <!-- Location Section -->
        <div class="section">
            <div class="section-title">GPS Location</div>
            <div class="grid">
                <div class="data-box">
                    <div class="label">Latitude</div>
                    <div id="lat" class="value">Waiting...</div>
                </div>
                <div class="data-box">
                    <div class="label">Longitude</div>
                    <div id="lon" class="value">Waiting...</div>
                </div>
                <div class="data-box full-width">
                   <div class="label">Google Plus Code</div>
                    <div id="plus-code" class="value" style="color: #a7f3d0;">Waiting...</div>
               </div>  
            </div>
        </div>

        <!-- Weather Section -->
        <div class="section">
            <div class="section-title">Wind Conditions</div>
            <div class="grid">
                <div class="data-box full-width">
                    <div class="label">Wind Speed</div>
                    <div id="wind-speed" class="huge-value">Waiting...</div>
                </div>
                <div class="data-box">
                    <div class="label">Direction</div>
                    <div id="wind-dir" class="value">Waiting...</div>
                </div>
                <div class="data-box">
                    <div class="label">Gusts</div>
                    <div id="wind-gusts" class="value">Waiting...</div>
                </div>
            </div>
        </div>

        <div id="error-msg" class="error"></div>
    </div>

    <script>
        // --- 1. Clock and Date Functionality ---
        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString();
            document.getElementById('date').textContent = now.toLocaleDateString(undefined, {
                weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
            });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 2. Pure JS Google Plus Code Encoder (fallback) ---
        function encodePlusCode(latitude, longitude) {
            const ALPHABET = "23456789CFGHJMPQRVWX";
            
            // Limit latitude and longitude to valid ranges
            let lat = Math.min(Math.max(latitude, -90), 90);
            let lon = longitude;
            while (lon < -180) lon += 360;
            while (lon >= 180) lon -= 360;

            // Collapse lat/lon into coordinate space
            if (lat === 90) lat = lat - 0.0000001;

            let code = "";
            
            // Compute pairs (First 10 characters / 5 pairs)
            let latVal = lat + 90;
            let lonVal = lon + 180;

            for (let i = 0; i < 5; i++) {
                let digitPlace = Math.pow(20, 4 - i);
                
                let latDigit = Math.floor(latVal / digitPlace);
                latVal -= latDigit * digitPlace;
                
                let lonDigit = Math.floor(lonVal / digitPlace);
                lonVal -= lonDigit * digitPlace;
                
                code += ALPHABET[latDigit] + ALPHABET[lonDigit];
                
                if (i === 3) code += "+"; // Inject separator after 8th digit
            }
            
            return code;
        }

        // --- 3. Geolocation Core ---
        function initLocation() {
            if (!navigator.geolocation) {
                document.getElementById('error-msg').textContent = "Geolocation is not supported by this browser.";
                return;
            }
            
            navigator.geolocation.watchPosition(successLocation, errorLocation, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });
        }

        function successLocation(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            document.getElementById('lat').textContent = lat.toFixed(6);
            document.getElementById('lon').textContent = lon.toFixed(6);

            // Prefer official OpenLocationCode if loaded; fall back to local implementation
            try {
                let globalPlusCode;
                if (typeof OpenLocationCode !== 'undefined' && OpenLocationCode && typeof OpenLocationCode.encode === 'function') {
                    globalPlusCode = OpenLocationCode.encode(lat, lon);
                } else {
                    globalPlusCode = encodePlusCode(lat, lon);
                }
                document.getElementById('plus-code').textContent = globalPlusCode;
            } catch (e) {
                console.warn('Plus code generation failed', e);
                document.getElementById('plus-code').textContent = "Calculation Error";
            }

            // Sync weather data
            fetchWindData(lat, lon);
        }

        function errorLocation(error) {
            let msg = "GPS Signal Error. Check device location permissions.";
            if (error && error.code === 1) {
                msg = "Please allow location permissions in your browser bar.";
            } else if (error && error.code === 3) {
                msg = "GPS tracking timed out. Retrying...";
            }
            document.getElementById('error-msg').textContent = msg;
        }

        // --- 4. Weather Sync (fixed Open-Meteo usage) ---
        async function fetchWindData(lat, lon) {
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=windgusts_10m&windspeed_unit=mph&timezone=auto`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`Weather fetch failed (${response.status})`);
                const data = await response.json();

                const current = data.current_weather;
                if (!current) throw new Error('No current_weather in response');

                const degreesToCompass = (deg) => {
                    if (deg == null || isNaN(deg)) return "N/A";
                    const idx = Math.floor((deg / 22.5) + 0.5) % 16;
                    const arr = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
                    return `${arr[idx]} (${Math.round(deg)}°)`;
                };

                let gustsDisplay = "N/A";
                if (data.hourly && Array.isArray(data.hourly.time) && Array.isArray(data.hourly.windgusts_10m)) {
                    const idx = data.hourly.time.indexOf(current.time);
                    if (idx !== -1 && data.hourly.windgusts_10m[idx] != null) {
                        gustsDisplay = `${data.hourly.windgusts_10m[idx]} mph`;
                    } else {
                        const last = data.hourly.windgusts_10m[data.hourly.windgusts_10m.length - 1];
                        if (last != null) gustsDisplay = `${last} mph`;
                    }
                }

                document.getElementById('wind-speed').textContent = `${current.windspeed} mph`;
                document.getElementById('wind-dir').textContent = degreesToCompass(current.winddirection);
                document.getElementById('wind-gusts').textContent = gustsDisplay;
                document.getElementById('error-msg').textContent = "";

            } catch (error) {
                console.error(error);
                document.getElementById('wind-speed').textContent = "Offline";
                document.getElementById('wind-dir').textContent = "Offline";
                document.getElementById('wind-gusts').textContent = "Offline";
                document.getElementById('error-msg').textContent = "Weather server unreachable. Checking connection...";
            }
        }

        // Boot
        initLocation();
    </script>
</body>
</html>
